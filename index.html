<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <title>Web Audio Spatial Demo</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --panel-bg: rgba(30, 41, 59, 0.7);
            --text-color: #f8fafc;
            --accent-red: #ef4444;
            --accent-green: #22c55e;
        }

        body {
            margin: 0;
            overflow: hidden;
            background-color: var(--bg-color);
            font-family: 'Segoe UI', system-ui, sans-serif;
            color: var(--text-color);
        }

        /* 資訊面板 */
        #info_panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: var(--panel-bg);
            padding: 15px 25px;
            border-radius: 12px;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            pointer-events: none;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            z-index: 10;
        }

        .data-row {
            font-family: monospace;
            font-size: 14px;
            margin: 5px 0;
            opacity: 0.9;
        }

        #distance {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--accent-green);
            margin-bottom: 10px;
        }

        /* 標記點 */
        .marker {
            position: absolute;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            display: none;
            transition: transform 0.1s ease;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.5);
        }

        #mouse_marker {
            background: var(--accent-red);
            border: 3px solid white;
            box-shadow: 0 0 20px var(--accent-red);
            z-index: 5;
        }

        #target_marker {
            background: var(--accent-green);
            border: 3px solid white;
            box-shadow: 0 0 20px var(--accent-green);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 1;
            }

            50% {
                transform: translate(-50%, -50%) scale(1.3);
                opacity: 0.7;
            }

            100% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 1;
            }
        }

        /* 按鈕美化 */
        #reset_btn {
            display: none;
            position: absolute;
            top: 60%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 12px 30px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(37, 99, 235, 0.4);
            transition: all 0.2s;
            z-index: 20;
        }

        #reset_btn:hover {
            transform: translate(-50%, -55%);
            box-shadow: 0 15px 30px rgba(37, 99, 235, 0.5);
        }

        /* 遊戲說明 */
        #hint {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            opacity: 0.6;
            font-size: 14px;
        }
    </style>
</head>

<body>
    <div id="info_panel">
        <div id="distance">Distance: --</div>
        <div id="scale" class="data-row">🔍 Audio Scale: 1.00x</div>
        <div id="mouse_pos" class="data-row">Mouse XY: --</div>
        <div id="target_pos" class="data-row">Target XY: --</div>
    
        <hr style="opacity: 0.2; margin: 15px 0;">
        <div style="font-size: 12px; color: #94a3b8; margin-bottom: 5px;">RECENT SCORES (Distance)</div>
        <div id="history_list" style="font-family: monospace; font-size: 13px; line-height: 1.6;">
        </div>
    </div>

    <div id="mouse_marker" class="marker"></div>
    <div id="target_marker" class="marker"></div>

    <button id="reset_btn">再玩一次</button>

    <div id="hint">使用 [A] 聽滑鼠聲音，[S] 聽目標聲音 | 滾輪縮放縮放倍率 | 點擊鎖定</div>

    <script src="app.js"></script>
</body>

</html>
